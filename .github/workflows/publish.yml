name: publish

on:
  push:
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      # Token-based publish via repo secret UV_PUBLISH_TOKEN, matching
      # the sibling owa-cal / owa-piggy publish flow.
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.UV_PUBLISH_TOKEN }}
